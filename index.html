<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>19 задание · ОГЭ</title>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #3B5BDB;
    --blue-light: #4C6EF5;
    --blue-dark: #2F4AC7;
    --bg: #F4F6FB;
    --card: #FFFFFF;
    --text: #1A1D23;
    --muted: #8A93A8;
    --border: #E8EBF2;
    --green: #2ECC71;
    --red: #E74C3C;
    --green-light: #EAFAF3;
    --red-light: #FDEDEC;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(59,91,219,.08);
  }

  body {
    font-family: 'Onest', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px 48px;
  }

  /* ── TOPIC PICKER ── */
  .picker-wrap {
    max-width: 680px;
    margin: 0 auto;
  }
  .picker-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .picker-header h1 {
    font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 6px;
  }
  .picker-header p {
    font-size: 14px; color: var(--muted);
  }

  .topic-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .topic-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 16px;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow);
  }
  .topic-card:hover {
    border-color: var(--blue);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(59,91,219,.14);
  }
  .topic-card.selected {
    border-color: var(--blue);
    background: #EEF2FF;
  }
  .topic-card.all-card {
    grid-column: 1 / -1;
    justify-content: center;
    background: linear-gradient(135deg, #EEF2FF, #E8EDFF);
    border-color: var(--blue);
  }
  .topic-card.all-card:hover {
    background: linear-gradient(135deg, #E0E7FF, #D8E1FF);
  }
  .topic-icon {
    font-size: 26px; line-height: 1; flex-shrink: 0;
  }
  .topic-info { flex: 1; min-width: 0; }
  .topic-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .topic-count { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .topic-card.all-card .topic-name { font-size: 15px; color: var(--blue); }
  .topic-card.all-card .topic-count { color: var(--blue-light); }

  .start-btn {
    width: 100%; padding: 15px;
    background: var(--blue); color: #fff;
    border: none; border-radius: 12px;
    font-family: 'Onest', sans-serif; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all .2s; margin-top: 8px;
  }
  .start-btn:hover { background: var(--blue-dark); transform: translateY(-1px); }
  .start-btn:disabled { opacity: .45; cursor: default; transform: none; }

  /* ── QUIZ ── */
  .quiz-wrap {
    max-width: 1040px;
    margin: 0 auto;
    display: none;
    gap: 24px;
    align-items: flex-start;
  }
  .quiz-wrap.show { display: flex; }
  .quiz-area { flex: 1; min-width: 0; }
  .sidebar-right { width: 300px; flex-shrink: 0; }

  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--muted);
    cursor: pointer; margin-bottom: 18px; transition: color .15s;
    background: none; border: none; font-family: 'Onest', sans-serif; padding: 0;
  }
  .back-btn:hover { color: var(--blue); }

  .stats-row { display: flex; gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card); border-radius: var(--radius);
    padding: 14px 18px; display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow); flex: 1;
  }
  .stat-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .stat-icon.blue { background: #EEF2FF; }
  .stat-icon.green { background: #EAFAF3; }
  .stat-icon.red { background: #FDEDEC; }
  .stat-icon.yellow { background: #FEF9EC; }
  .stat-label { font-size: 11px; color: var(--muted); font-weight: 500; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; }

  .progress-card {
    background: var(--card); border-radius: var(--radius);
    padding: 18px 22px; box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .progress-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .progress-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .progress-pct { font-size: 12px; color: var(--muted); }
  .progress-bar-bg { height: 7px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--blue), var(--blue-light));
    border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1);
  }
  .category-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: #EEF2FF; color: var(--blue);
    border-radius: 20px; padding: 4px 12px;
    font-size: 12px; font-weight: 600; margin-top: 10px;
  }

  .question-card {
    background: var(--card); border-radius: var(--radius);
    padding: 28px 26px; box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .question-number { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 14px; }
  .question-text { font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.6; margin-bottom: 24px; }

  .answer-buttons { display: flex; gap: 12px; }
  .answer-btn {
    flex: 1; padding: 14px 20px; border: 2px solid var(--border);
    border-radius: 12px; background: var(--bg);
    font-family: 'Onest', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all .18s;
    display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--text);
  }
  .answer-btn:hover:not(:disabled) { border-color: var(--blue); background: #EEF2FF; color: var(--blue); transform: translateY(-1px); }
  .answer-btn.correct { border-color: var(--green); background: var(--green-light); color: #1E8449; }
  .answer-btn.wrong { border-color: var(--red); background: var(--red-light); color: var(--red); }
  .answer-btn.reveal-correct { border-color: var(--green); background: var(--green-light); color: #1E8449; animation: pulse-green .4s; }
  @keyframes pulse-green { 0%{transform:scale(1)} 50%{transform:scale(1.03)} 100%{transform:scale(1)} }
  .answer-btn:disabled { cursor: default; }

  .feedback {
    margin-top: 16px; padding: 12px 16px; border-radius: 10px;
    font-size: 14px; font-weight: 500; display: none; align-items: center; gap: 10px;
  }
  .feedback.show { display: flex; }
  .feedback.correct { background: var(--green-light); color: #1E8449; border: 1px solid #A9DFBF; }
  .feedback.wrong { background: var(--red-light); color: var(--red); border: 1px solid #F5B7B1; }

  .next-btn {
    margin-top: 14px; width: 100%; padding: 13px;
    background: var(--blue); color: #fff; border: none; border-radius: 12px;
    font-family: 'Onest', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all .18s; display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { background: var(--blue-dark); transform: translateY(-1px); }

  .review-banner {
    background: linear-gradient(135deg, #FEF9EC, #FFF3CC);
    border: 1.5px solid #F39C12; border-radius: 12px;
    padding: 12px 18px; display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; font-size: 13px; font-weight: 500; color: #7D6608;
  }

  .results-screen, .finish-screen {
    display: none; flex-direction: column; align-items: center;
    text-align: center; padding: 40px 28px;
    background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
  }
  .results-screen.show, .finish-screen.show { display: flex; }
  .results-emoji { font-size: 52px; margin-bottom: 14px; }
  .results-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .results-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .results-score { display: flex; gap: 16px; margin-bottom: 26px; flex-wrap: wrap; justify-content: center; }
  .score-pill { padding: 10px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; }
  .score-pill.green { background: var(--green-light); color: #1E8449; }
  .score-pill.red { background: var(--red-light); color: var(--red); }
  .results-btns { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .results-btn {
    padding: 13px 24px; background: var(--blue); color: #fff;
    border: none; border-radius: 12px; font-family: 'Onest', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all .18s;
  }
  .results-btn:hover { background: var(--blue-dark); }
  .results-btn.secondary {
    background: var(--bg); color: var(--text); border: 2px solid var(--border);
  }
  .results-btn.secondary:hover { border-color: var(--blue); color: var(--blue); background: #EEF2FF; }

  /* HISTORY */
  .history-card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
    position: sticky; top: 24px;
  }
  .history-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; justify-content: space-between;
  }
  .history-badge { background: var(--blue); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
  .history-list { max-height: 520px; overflow-y: auto; }
  .history-item {
    padding: 10px 18px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 8px; font-size: 12px;
  }
  .history-item:last-child { border-bottom: none; }
  .history-num {
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .history-num.correct { background: var(--green-light); color: #1E8449; }
  .history-num.wrong { background: var(--red-light); color: var(--red); }
  .history-text { color: var(--muted); line-height: 1.4; flex: 1; }
  .history-icon { font-size: 12px; flex-shrink: 0; margin-top: 2px; }
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  @keyframes slideIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .animate-in { animation: slideIn .32s cubic-bezier(.4,0,.2,1) forwards; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .picker-wrap { animation: fadeIn .35s ease forwards; }

  @media (max-width: 720px) {
    .quiz-wrap.show { flex-direction: column; }
    .sidebar-right { width: 100%; position: static; }
    .stats-row { flex-wrap: wrap; }
    .stat-card { min-width: calc(50% - 6px); }
    .topic-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- ── TOPIC PICKER ── -->
<div class="picker-wrap" id="pickerScreen">
  <div class="picker-header">
    <h1>19 задание · ОГЭ</h1>
    <p>Верные и неверные утверждения · Выберите тему</p>
  </div>

  <div class="topic-grid" id="topicGrid"></div>
  <button class="start-btn" id="startBtn" onclick="startQuiz()" disabled>Начать тренировку →</button>
</div>

<!-- ── QUIZ ── -->
<div class="quiz-wrap" id="quizScreen">
  <div class="quiz-area">
    <button class="back-btn" onclick="backToPicker()">← Сменить тему</button>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon blue">📋</div><div><div class="stat-label">Всего</div><div class="stat-value" id="totalCount">—</div></div></div>
      <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-label">Верно</div><div class="stat-value" id="correctCount">0</div></div></div>
      <div class="stat-card"><div class="stat-icon red">❌</div><div><div class="stat-label">Ошибок</div><div class="stat-value" id="wrongCount">0</div></div></div>
      <div class="stat-card"><div class="stat-icon yellow">🎯</div><div><div class="stat-label">Точность</div><div class="stat-value" id="accuracy">—</div></div></div>
    </div>

    <div class="review-banner" id="reviewBanner" style="display:none">
      <span>⚠️</span>
      <span>Работа над ошибками — ответьте правильно на вопросы, в которых вы ошиблись</span>
    </div>

    <div class="progress-card" id="progressCard">
      <div class="progress-header">
        <span class="progress-title" id="progressTitle">Вопрос 1 из N</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div id="catTag" class="category-tag">📐 Загрузка...</div>
    </div>

    <div class="question-card animate-in" id="questionCard">
      <div class="question-number" id="qNumber">ВОПРОС 1</div>
      <div class="question-text" id="qText">Загрузка...</div>
      <div class="answer-buttons">
        <button class="answer-btn" id="btnTrue" onclick="answer(true)">✓ Верно</button>
        <button class="answer-btn" id="btnFalse" onclick="answer(false)">✗ Неверно</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Следующий вопрос →</button>
    </div>

    <div class="results-screen" id="resultsScreen">
      <div class="results-emoji" id="resultsEmoji">🎉</div>
      <div class="results-title" id="resultsTitle">Тест завершён!</div>
      <div class="results-sub" id="resultsSub"></div>
      <div class="results-score">
        <div class="score-pill green" id="resultCorrect"></div>
        <div class="score-pill red" id="resultWrong"></div>
      </div>
      <div class="results-btns">
        <button class="results-btn secondary" onclick="backToPicker()">← Сменить тему</button>
        <button class="results-btn" id="resultsBtn"></button>
      </div>
    </div>

    <div class="finish-screen" id="finishScreen">
      <div class="results-emoji">🏆</div>
      <div class="results-title">Все ошибки исправлены!</div>
      <div class="results-sub" id="finalSub"></div>
      <div class="results-score">
        <div class="score-pill green" id="finalCorrect"></div>
        <div class="score-pill red" id="finalWrong"></div>
      </div>
      <div class="results-btns">
        <button class="results-btn secondary" onclick="backToPicker()">← Сменить тему</button>
        <button class="results-btn" onclick="restartSameTopic()">🔄 Ещё раз</button>
      </div>
    </div>
  </div>

  <div class="sidebar-right">
    <div class="history-card">
      <div class="history-header">
        <span>История ответов</span>
        <span class="history-badge" id="historyBadge">0</span>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
  </div>
</div>

<script>
const ALL_QUESTIONS = [

  { category: "Параллелограмм", text: "Площадь любого параллелограмма равна произведению длин его сторон", answer: false },
  { category: "Ромб", text: "В любой ромб можно вписать окружность", answer: true },

const ICONS = { "Параллелограмм":"🟡","Ромб":"🟢","Прямоугольник":"🔵","Квадрат":"🟣","Трапеция":"🟠","Треугольник":"🔴","Окружность":"⚪️","Другие":"🟤" };

// ── BUILD TOPIC GRID ──
const categories = [...new Set(ALL_QUESTIONS.map(q => q.category))];
let selectedTopic = null;

function buildPicker() {
  const grid = document.getElementById('topicGrid');
  grid.innerHTML = '';

  // All card
  const allCount = ALL_QUESTIONS.length;
  const allCard = document.createElement('div');
  allCard.className = 'topic-card all-card';
  allCard.dataset.topic = '__all__';
  allCard.innerHTML = `<div class="topic-icon">📚</div><div class="topic-info"><div class="topic-name">Все темы</div><div class="topic-count">${allCount} утверждений</div></div>`;
  allCard.onclick = () => selectTopic('__all__', allCard);
  grid.appendChild(allCard);

  categories.forEach(cat => {
    const count = ALL_QUESTIONS.filter(q => q.category === cat).length;
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.dataset.topic = cat;
    card.innerHTML = `<div class="topic-icon">${ICONS[cat] || '📐'}</div><div class="topic-info"><div class="topic-name">${cat}</div><div class="topic-count">${count} утверждений</div></div>`;
    card.onclick = () => selectTopic(cat, card);
    grid.appendChild(card);
  });
}

function selectTopic(topic, cardEl) {
  document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
  cardEl.classList.add('selected');
  selectedTopic = topic;
  document.getElementById('startBtn').disabled = false;
}

// ── QUIZ STATE ──
let questions = [], currentIdx = 0, correctTotal = 0, wrongTotal = 0;
let history = [], answered = false, isReviewMode = false, activeTopic = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  if (!selectedTopic) return;
  activeTopic = selectedTopic;
  const pool = activeTopic === '__all__' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.category === activeTopic);
  questions = shuffle(pool);
  currentIdx = 0; correctTotal = 0; wrongTotal = 0;
  history = []; answered = false; isReviewMode = false;

  document.getElementById('pickerScreen').style.display = 'none';
  document.getElementById('quizScreen').classList.add('show');
  resetQuizUI();
  showQuestion();
}

function backToPicker() {
  document.getElementById('quizScreen').classList.remove('show');
  document.getElementById('pickerScreen').style.display = '';
  // deselect
  document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
  selectedTopic = null;
  document.getElementById('startBtn').disabled = true;
}

function restartSameTopic() {
  const pool = activeTopic === '__all__' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.category === activeTopic);
  questions = shuffle(pool);
  currentIdx = 0; correctTotal = 0; wrongTotal = 0;
  history = []; answered = false; isReviewMode = false;
  resetQuizUI();
  showQuestion();
}

function resetQuizUI() {
  document.getElementById('totalCount').textContent = questions.length;
  document.getElementById('correctCount').textContent = '0';
  document.getElementById('wrongCount').textContent = '0';
  document.getElementById('accuracy').textContent = '—';
  document.getElementById('historyList').innerHTML = '';
  document.getElementById('historyBadge').textContent = '0';
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('finishScreen').classList.remove('show');
  document.getElementById('questionCard').style.display = '';
  document.getElementById('progressCard').style.display = '';
  document.getElementById('reviewBanner').style.display = 'none';
}

function showQuestion() {
  const q = questions[currentIdx];
  const total = questions.length;
  const pct = Math.round((currentIdx / total) * 100);
  document.getElementById('qNumber').textContent = `ВОПРОС ${currentIdx + 1}`;
  document.getElementById('qText').textContent = q.text;
  document.getElementById('progressTitle').textContent = `Вопрос ${currentIdx + 1} из ${total}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('catTag').textContent = `${ICONS[q.category] || '📐'} ${q.category}`;
  const btnT = document.getElementById('btnTrue');
  const btnF = document.getElementById('btnFalse');
  btnT.className = 'answer-btn'; btnT.disabled = false; btnT.textContent = '✓ Верно';
  btnF.className = 'answer-btn'; btnF.disabled = false; btnF.textContent = '✗ Неверно';
  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';
  document.getElementById('nextBtn').classList.remove('show');
  answered = false;
  const card = document.getElementById('questionCard');
  card.classList.remove('animate-in');
  void card.offsetWidth;
  card.classList.add('animate-in');
}

function answer(userAnswer) {
  if (answered) return;
  answered = true;
  const q = questions[currentIdx];
  const correct = userAnswer === q.answer;
  const btnT = document.getElementById('btnTrue');
  const btnF = document.getElementById('btnFalse');
  btnT.disabled = true; btnF.disabled = true;
  const clickedBtn = userAnswer ? btnT : btnF;
  if (correct) {
    clickedBtn.className = 'answer-btn correct';
    correctTotal++;
    document.getElementById('correctCount').textContent = correctTotal;
  } else {
    clickedBtn.className = 'answer-btn wrong';
    (q.answer ? btnT : btnF).className = 'answer-btn reveal-correct';
    wrongTotal++;
    document.getElementById('wrongCount').textContent = wrongTotal;
  }
  const done = correctTotal + wrongTotal;
  document.getElementById('accuracy').textContent = Math.round((correctTotal / done) * 100) + '%';
  const fb = document.getElementById('feedback');
  fb.className = `feedback ${correct ? 'correct' : 'wrong'} show`;
  fb.textContent = correct
    ? '✓ Правильно! Утверждение ' + (q.answer ? 'верно.' : 'неверно.')
    : '✗ Ошибка! Правильный ответ: ' + (q.answer ? '«Верно»' : '«Неверно»') + '.';
  history.push({ text: q.text, category: q.category, correct, qAnswer: q.answer });
  addHistoryItem(history.length, q, correct);
  document.getElementById('historyBadge').textContent = history.length;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.add('show');
  nextBtn.textContent = (currentIdx + 1 >= questions.length)
    ? (isReviewMode ? 'Завершить работу над ошибками →' : 'Завершить тест →')
    : 'Следующий вопрос →';
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= questions.length) showResults();
  else showQuestion();
}

function addHistoryItem(num, q, correct) {
  const list = document.getElementById('historyList');
  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `<div class="history-num ${correct?'correct':'wrong'}">${num}</div><div class="history-text">${q.text}</div><div class="history-icon">${correct?'✅':'❌'}</div>`;
  list.prepend(item);
}

function showResults() {
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('progressCard').style.display = 'none';
  if (isReviewMode) {
    document.getElementById('finishScreen').classList.add('show');
    document.getElementById('finalCorrect').textContent = `✅ Верно: ${correctTotal}`;
    document.getElementById('finalWrong').textContent = `❌ Ошибок: ${wrongTotal}`;
    document.getElementById('finalSub').textContent = `Тренажёр пройден! Точность: ${Math.round((correctTotal/(correctTotal+wrongTotal))*100)}%`;
    return;
  }
  const rs = document.getElementById('resultsScreen');
  rs.classList.add('show');
  const pct = Math.round((correctTotal / questions.length) * 100);
  document.getElementById('resultCorrect').textContent = `✅ Верно: ${correctTotal}`;
  document.getElementById('resultWrong').textContent = `❌ Ошибок: ${wrongTotal}`;
  document.getElementById('resultsSub').textContent = `Отвечено на ${questions.length} вопросов. Точность: ${pct}%`;
  const btn = document.getElementById('resultsBtn');
  if (wrongTotal === 0) {
    document.getElementById('resultsEmoji').textContent = '🏆';
    document.getElementById('resultsTitle').textContent = 'Идеальный результат!';
    btn.textContent = '🔄 Ещё раз';
    btn.onclick = restartSameTopic;
  } else {
    document.getElementById('resultsEmoji').textContent = pct >= 70 ? '🎉' : '📚';
    document.getElementById('resultsTitle').textContent = pct >= 70 ? 'Хороший результат!' : 'Нужно поработать';
    btn.textContent = `⚠️ Работа над ошибками (${wrongTotal})`;
    btn.onclick = startReview;
  }
}

function startReview() {
  const wrongQs = history.filter(h => !h.correct).map(h => ({ category: h.category, text: h.text, answer: h.qAnswer }));
  if (!wrongQs.length) { restartSameTopic(); return; }
  isReviewMode = true;
  questions = shuffle(wrongQs);
  currentIdx = 0; correctTotal = 0; wrongTotal = 0;
  history = []; answered = false;
  document.getElementById('totalCount').textContent = questions.length;
  document.getElementById('correctCount').textContent = '0';
  document.getElementById('wrongCount').textContent = '0';
  document.getElementById('accuracy').textContent = '—';
  document.getElementById('historyList').innerHTML = '';
  document.getElementById('historyBadge').textContent = '0';
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('questionCard').style.display = '';
  document.getElementById('progressCard').style.display = '';
  document.getElementById('reviewBanner').style.display = 'flex';
  showQuestion();
}

buildPicker();
</script>
